version: "3.9"
name: stanford_local

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3333:3333"
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        BACKEND_API: ${BACKEND_API}
        NEXT_PUBLIC_HOST: ${NEXT_PUBLIC_HOST}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
    ports:
      - "3000:3000"
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      - db

  db:
    image: postgres:13.2
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data: