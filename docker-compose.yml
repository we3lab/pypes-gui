name: stanford_local

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3333:3333"
    restart: always
    environment:
      - BACKEND_API=${BACKEND_API}

  frontend:
    build:
      context: ./frontend
      args:
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        BACKEND_API: ${BACKEND_API}
        NEXT_PUBLIC_HOST: ${NEXT_PUBLIC_HOST}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - BACKEND_API=${BACKEND_API}
      - NEXT_PUBLIC_HOST=${NEXT_PUBLIC_HOST}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    depends_on:
      - backend